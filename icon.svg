<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2926"/>
      <stop offset="100%" style="stop-color:#1a1614"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a838"/>
      <stop offset="100%" style="stop-color:#d4912a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book spine left -->
  <rect x="140" y="120" width="40" height="280" rx="6" fill="url(#accent)" opacity="0.9"/>
  <!-- Book spine center -->
  <rect x="195" y="100" width="45" height="300" rx="6" fill="#7d9b76" opacity="0.9"/>
  <!-- Book spine right -->
  <rect x="255" y="130" width="38" height="270" rx="6" fill="#c47272" opacity="0.8"/>
  <!-- Shelf -->
  <rect x="110" y="390" width="300" height="12" rx="4" fill="url(#accent)" opacity="0.6"/>
  <!-- Small decorative dots -->
  <circle cx="340" cy="200" r="6" fill="#e8a838" opacity="0.4"/>
  <circle cx="360" cy="260" r="4" fill="#7d9b76" opacity="0.4"/>
  <circle cx="350" cy="330" r="5" fill="#f0e6d8" opacity="0.3"/>
</svg>
